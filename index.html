<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pingbot</title>
    <meta name="description" content="A lightweight self-hosted uptime monitoring service">
    <meta name="author" content="Andy Field - Field Office">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0d1117;
            --surface:    #161b22;
            --border:     #21262d;
            --muted:      #8b949e;
            --text:       #e6edf3;
            --accent:     #f0883e;   /* amber — the alert colour */
            --up:         #3fb950;
            --down:       #f85149;
            --mono:       'JetBrains Mono', monospace;
            --sans:       'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Layout ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: grid; place-items: center;
        }
        .logo-mark svg { width: 16px; height: 16px; }

        header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
        header span { color: var(--muted); font-size: 13px; margin-left: auto; font-family: var(--mono); }

        main { max-width: 860px; margin: 0 auto; padding: 40px 32px; }

        /* ── Add site form ── */
        .add-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 36px;
        }
        .add-form h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }

        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row input {
            flex: 1 1 200px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 9px 12px;
            outline: none;
            transition: border-color .15s;
        }
        .form-row input:focus { border-color: var(--accent); }
        .form-row input::placeholder { color: var(--muted); }

        .btn {
            background: var(--accent);
            border: none; border-radius: 6px;
            color: #0d1117;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            padding: 9px 18px;
            transition: opacity .15s;
            white-space: nowrap;
        }
        .btn:hover { opacity: .85; }
        .btn:disabled { opacity: .4; cursor: default; }
        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .btn.secondary:hover { border-color: var(--muted); color: var(--text); opacity: 1; }

        /* ── Summary bar ── */
        .summary {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        .stat { display: flex; flex-direction: column; }
        .stat-value { font-size: 24px; font-weight: 600; font-family: var(--mono); line-height: 1; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-top: 4px; }
        .stat-value.up   { color: var(--up);   }
        .stat-value.down { color: var(--down); }

        /* ── Site list ── */
        .sites-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .sites-header h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

        .site-list { display: flex; flex-direction: column; gap: 8px; }

        .site-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color .2s;
        }
        .site-card:hover { border-color: #30363d; }
        .site-card.is-down { border-color: rgba(248, 81, 73, .35); }

        /* Heartbeat dot */
        .pulse-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--muted);
        }
        .pulse-dot.up {
            background: var(--up);
            box-shadow: 0 0 0 0 rgba(63,185,80,.7);
            animation: heartbeat 2.5s ease-in-out infinite;
        }
        .pulse-dot.down { background: var(--down); }

        @keyframes heartbeat {
            0%   { box-shadow: 0 0 0 0   rgba(63,185,80,.6); }
            60%  { box-shadow: 0 0 0 6px rgba(63,185,80,0);  }
            100% { box-shadow: 0 0 0 0   rgba(63,185,80,0);  }
        }

        .site-info { flex: 1; min-width: 0; }
        .site-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .site-url  { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .site-meta {
            display: flex; align-items: center; gap: 16px;
            flex-shrink: 0;
        }
        .badge {
            font-size: 11px; font-weight: 600; font-family: var(--mono);
            padding: 3px 8px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .badge.up   { background: rgba(63,185,80,.12); color: var(--up); }
        .badge.down { background: rgba(248,81,73,.12); color: var(--down); }
        .badge.unknown { background: rgba(139,148,158,.1); color: var(--muted); }

        .resp-time { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 60px; text-align: right; }
        .last-check { font-size: 11px; color: var(--muted); min-width: 90px; text-align: right; }

        .site-actions { display: flex; gap: 6px; }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 4px; border-radius: 4px;
            transition: color .15s, background .15s;
            display: grid; place-items: center;
        }
        .icon-btn:hover { color: var(--down); background: rgba(248,81,73,.1); }
        .icon-btn.check-btn:hover { color: var(--text); background: rgba(255,255,255,.07); }

        /* ── Empty state ── */
        .empty {
            text-align: center; padding: 60px 20px;
            color: var(--muted);
        }
        .empty svg { margin-bottom: 16px; opacity: .3; }
        .empty p { font-size: 14px; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 13px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 999;
            max-width: 300px;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.error { border-color: rgba(248,81,73,.5); color: var(--down); }
        #toast.success { border-color: rgba(63,185,80,.4); color: var(--up); }

        /* ── Loading skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, #2a2f37 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 4px;
            height: 13px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 600px) {
            header { padding: 16px; }
            main { padding: 24px 16px; }
            .last-check, .resp-time { display: none; }
            .site-card { padding: 12px 14px; }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-mark">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 8h2l2-5 3 10 2-5h3" stroke="#0d1117" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <h1>Uptime Monitor</h1>
        <span id="next-check">Next check in —</span>
    </header>
    <main>
        <div class="add-form">
            <h2>Add site</h2>
            <div class="form-row">
                <input type="text" id="input-name" placeholder="Label  (e.g. My Blog)" />
                <input type="text" id="input-url" placeholder="https://example.com" />
                <input type="email" id="input-email" placeholder="Alert email" />
                <button class="btn" id="add-btn" onclick="addSite()">Add</button>
            </div>
        </div>
        <div class="summary" id="summary" style="display:none">
            <div class="stat"><span class="stat-value up" id="count-up">0</span><span class="stat-label">Online</span></div>
            <div class="stat"><span class="stat-value down" id="count-down">0</span><span class="stat-label">Offline</span></div>
            <div class="stat"><span class="stat-value" id="count-total">0</span><span class="stat-label">Total</span></div>
        </div>
        <div class="sites-header">
            <h2>Monitored sites</h2>
            <button class="btn secondary" onclick="checkAll()" id="check-all-btn" style="display:none">Check all now</button>
        </div>
        <div class="site-list" id="site-list">
            <div class="empty">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 6v6l4 2" /></svg>
                <p>No sites yet — add one above to start monitoring.</p>
            </div>
        </div>
    </main>
    <div id="toast"></div>
    <script>
    // ── State ─────────────────────────────────────────────────────────────────────
    let sites = [];
    let countdown = 300;
    let countdownTimer = null;

    // ── Boot ──────────────────────────────────────────────────────────────────────
    async function boot() {
        await loadSites();
        startCountdown();
        // Auto-refresh status every 5 min (matches cron)
        setInterval(async () => {
            await loadSites();
            countdown = 300;
        }, 300 _000);
    }

    // ── API helpers ───────────────────────────────────────────────────────────────
    async function api(endpoint, options = {}) {
        const res = await fetch(`api/${endpoint}`, {
            headers: { 'Content-Type': 'application/json' },
            ...options
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    // ── Load sites ────────────────────────────────────────────────────────────────
    async function loadSites() {
        try {
            const data = await api('sites.php');
            sites = data.sites || [];
            renderSites();
        } catch (e) {
            showToast('Could not load sites: ' + e.message, 'error');
        }
    }

    // ── Add site ──────────────────────────────────────────────────────────────────
    async function addSite() {
        const name = document.getElementById('input-name').value.trim();
        const url = document.getElementById('input-url').value.trim();
        const email = document.getElementById('input-email').value.trim();

        if (!name || !url || !email) { showToast('Fill in all three fields.', 'error'); return; }
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        document.getElementById('input-url').value = url;

        const btn = document.getElementById('add-btn');
        btn.disabled = true;
        btn.textContent = 'Adding…';

        try {
            await api('sites.php', {
                method: 'POST',
                body: JSON.stringify({ name, url, email })
            });
            document.getElementById('input-name').value = '';
            document.getElementById('input-url').value = '';
            document.getElementById('input-email').value = '';
            showToast(`${name} added.`, 'success');
            await loadSites();
        } catch (e) {
            showToast(e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Add';
        }
    }

    // ── Delete site ───────────────────────────────────────────────────────────────
    async function deleteSite(id) {
        try {
            await api('sites.php', {
                method: 'DELETE',
                body: JSON.stringify({ id })
            });
            showToast('Site removed.', 'success');
            await loadSites();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    // ── Manual check ──────────────────────────────────────────────────────────────
    async function checkSite(id) {
        try {
            const data = await api(`check.php?id=${id}`);
            showToast(`${data.url}: ${data.status === 'up' ? '✓ Online' : '✗ Offline'} (${data.response_time}ms)`, data.status === 'up' ? 'success' : 'error');
            await loadSites();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    async function checkAll() {
        const btn = document.getElementById('check-all-btn');
        btn.disabled = true;
        btn.textContent = 'Checking…';
        try {
            await api('check.php?all=1');
            showToast('All sites checked.', 'success');
            await loadSites();
        } catch (e) {
            showToast(e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Check all now';
        }
    }

    // ── Render ────────────────────────────────────────────────────────────────────
    function renderSites() {
        const list = document.getElementById('site-list');
        const summary = document.getElementById('summary');
        const checkAllBtn = document.getElementById('check-all-btn');

        if (!sites.length) {
            list.innerHTML = `<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <p>No sites yet — add one above to start monitoring.</p>
</div>`;
            summary.style.display = 'none';
            checkAllBtn.style.display = 'none';
            return;
        }

        const up = sites.filter(s => s.status === 'up').length;
        const down = sites.filter(s => s.status === 'down').length;

        document.getElementById('count-up').textContent = up;
        document.getElementById('count-down').textContent = down;
        document.getElementById('count-total').textContent = sites.length;

        summary.style.display = 'flex';
        checkAllBtn.style.display = 'inline-block';

        list.innerHTML = sites.map(s => {
            const statusClass = s.status || 'unknown';
            const isDown = s.status === 'down';
            const rt = s.response_time ? `${s.response_time}ms` : '—';
            const lastCheck = s.last_checked ? timeAgo(s.last_checked) : 'Never';

            return `<div class="site-card ${isDown ? 'is-down' : ''}">
      <span class="pulse-dot ${statusClass}"></span>
      <div class="site-info">
        <div class="site-name">${escHtml(s.name)}</div>
        <div class="site-url">${escHtml(s.url)}</div>
      </div>
      <div class="site-meta">
        <span class="badge ${statusClass}">${statusClass === 'unknown' ? '—' : statusClass}</span>
        <span class="resp-time">${rt}</span>
        <span class="last-check">${lastCheck}</span>
      </div>
      <div class="site-actions">
        <button class="icon-btn check-btn" title="Check now" onclick="checkSite(${s.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button class="icon-btn" title="Remove" onclick="deleteSite(${s.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
</div>`;
        }).join('');
    }

    // ── Countdown ─────────────────────────────────────────────────────────────────
    function startCountdown() {
        clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            countdown--;
            if (countdown <= 0) countdown = 300;
            const m = String(Math.floor(countdown / 60)).padStart(2, '0');
            const s = String(countdown % 60).padStart(2, '0');
            document.getElementById('next-check').textContent = `Next check in ${m}:${s}`;
        }, 1000);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function timeAgo(ts) {
        const diff = Math.floor((Date.now() / 1000) - ts);
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        return `${Math.floor(diff / 3600)}h ago`;
    }

    function escHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `show ${type}`;
        setTimeout(() => { t.className = type; }, 3500);
    }

    // Allow Enter key in inputs
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && ['input-name', 'input-url', 'input-email'].includes(e.target.id)) {
            addSite();
        }
    });

    boot();
    </script>
</body>

</html>
